<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages serves this file for any path it can't find. The app uses
      // hash-based routing from the root, so send visitors to the home page
      // (preserving any #/route they may have had).
      location.replace("/" + location.hash);
    </script>
  </head>
  <body></body>
</html>
